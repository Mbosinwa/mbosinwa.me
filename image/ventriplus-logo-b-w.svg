<svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 -18 277.3 78">
  <defs>
    <style>
      .cls-1 { fill: #fff; }
      .cls-2 { fill: #0653ce; }

      @keyframes icon-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes plus-float-1 {
        0%, 100% { transform: translateY(0); opacity: 0.9; }
        50% { transform: translateY(-7px); opacity: 0.4; }
      }
      @keyframes plus-float-2 {
        0%, 100% { transform: translateY(0); opacity: 0.65; }
        50% { transform: translateY(-9px); opacity: 0.25; }
      }
      @keyframes plus-float-3 {
        0%, 100% { transform: translateY(0); opacity: 0.45; }
        50% { transform: translateY(-11px); opacity: 0.1; }
      }

      .vp-icon {
        animation: icon-pulse 3s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .vp-plus-1 { animation: plus-float-1 2.4s ease-in-out infinite; }
      .vp-plus-2 { animation: plus-float-2 2.4s ease-in-out infinite 0.35s; }
      .vp-plus-3 { animation: plus-float-3 2.4s ease-in-out infinite 0.7s; }
    </style>
  </defs>

  <!-- Floating + signs above the icon -->
  <text class="vp-plus-1" x="8" y="-2" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#0653ce">+</text>
  <text class="vp-plus-2" x="20" y="-8" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#0653ce">+</text>
  <text class="vp-plus-3" x="30" y="-14" font-family="Arial, sans-serif" font-weight="bold" font-size="7" fill="#0653ce">+</text>

